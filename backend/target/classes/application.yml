server:
  port: 8001
  servlet:
    context-path: /api

spring:
  data:
    mongodb:
      uri: ${MONGO_URL:mongodb://localhost:27017}
      database: ${DB_NAME:garanti_bbva}
  
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    property-naming-strategy: SNAKE_CASE

jwt:
  secret: ${JWT_SECRET_KEY:your-secret-key-change-in-production-256-bit-key-here}
  expiration: 604800000  # 7 days in milliseconds

gemini:
  api-key: ${GEMINI_API_KEY:}

logging:
  level:
    root: INFO
    com.garantibbva: DEBUG
