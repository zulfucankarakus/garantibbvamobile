# ============================================================================
# Garanti BBVA Mobile Banking - Docker Compose (TUM SERVISLER)
# ============================================================================
# Servisler:
#   1) mongo          - MongoDB 7 (kalici volume ile)
#   2) mongo-express  - MongoDB admin paneli (port 8082)
#   3) backend        - Python FastAPI + TensorFlow LSTM (port 8001)
#   4) expo           - React Native / Expo SDK 54 Metro bundler (port 8081)
# ============================================================================
# BASLANGIC (tek komut):
#   1) Kok dizinde `.env` dosyasi olusturun:
#        cp .env.example .env
#      Icine kendi LAN IP'nizi yazin:
#        HOST_IP=192.168.1.42
#      Mac'te IP ogrenme:  ipconfig getifaddr en0
#
#   2) Ayaga kaldir:
#        docker compose up -d --build
#
#   3) QR kodu gor:
#        docker compose logs -f expo
#
#   4) Telefonda Expo Go ile QR'i tara (iOS: Kamera).
#      TC 12345678950 / Sifre Test123456
# ============================================================================

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: garanti-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - garanti-net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # Mongo Express - http://localhost:8082 (admin / admin123)
  mongo-express:
    image: mongo-express:1.0.2
    container_name: garanti-mongo-express
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
      ME_CONFIG_SITE_BASEURL: /
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - garanti-net

  # Backend (Python FastAPI + Deep Learning)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: garanti-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://mongo:27017
      DB_NAME: garanti_bbva
      JWT_SECRET_KEY: garanti-bbva-jwt-secret-change-in-production-256-bit-key
      CORS_ORIGINS: "*"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      COLLECTAPI_KEY: ${COLLECTAPI_KEY:-}
      EMERGENT_LLM_KEY: ${EMERGENT_LLM_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_CLOUD_VISION_API_KEY: ${GOOGLE_CLOUD_VISION_API_KEY:-}
      TF_CPP_MIN_LOG_LEVEL: "2"
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - garanti-net

  # Expo (React Native) - QR kod docker compose logs -f expo ile gorunur
  expo:
    build:
      context: ./mobile
      dockerfile: Dockerfile
    container_name: garanti-expo
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    environment:
      REACT_NATIVE_PACKAGER_HOSTNAME: "${HOST_IP:?HOST_IP .env dosyasinda tanimlanmali - orn HOST_IP=192.168.1.6}"
      EXPO_PUBLIC_API_URL: "http://${HOST_IP}:8001/api"
      EXPO_DEVTOOLS_LISTEN_ADDRESS: "0.0.0.0"
      EXPO_NO_TELEMETRY: "1"
      EXPO_TOKEN: ${EXPO_TOKEN:-}
    depends_on:
      - backend
    stdin_open: true
    tty: true
    networks:
      - garanti-net

volumes:
  mongo_data:
    name: garanti_mongo_data

networks:
  garanti-net:
    name: garanti-net
    driver: bridge